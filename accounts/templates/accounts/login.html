<style>
    /* 1. Fond bleu profond et flou (le "cadre" de la scène) */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', 'Segoe UI', sans-serif; /* Une police plus "tech" */
        background: radial-gradient(circle at center, #102542 0%, #081221 100%); /* Bleu nuit profond */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* 2. Le container "Verre" (Glassmorphism) */
    .glass-login-container {
        background: rgba(255, 255, 255, 0.05); /* Très transparent */
        backdrop-filter: blur(10px); /* L'effet de flou dépoli */
        -webkit-backdrop-filter: blur(10px);
        padding: 50px 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1); /* Bordure très fine et subtile */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 380px;
        text-align: center;
        position: relative;
        overflow: hidden; /* Pour contenir les reflets */
    }

    /* 3. L'Avatar Icône Photo (Subtil et technologique) */
    .photo-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px solid rgba(0, 212, 255, 0.3); /* Bordure bleu cyan subtile */
        margin: 0 auto 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 50px;
        color: rgba(0, 212, 255, 0.6); /* Cyan translucide */
        background: rgba(0, 0, 0, 0.2);
    }

    /* 4. Les Champs de Saisie (Minimalistes et sombres) */
    .input-group {
        margin-bottom: 20px;
        position: relative;
    }

    input[type="text"], 
    input[type="password"] {
        width: 100%;
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.3); /* Fond très sombre */
        border: 1px solid rgba(255, 255, 255, 0.1); /* Bordure subtile */
        border-radius: 10px;
        color: #fff; /* Texte blanc pour la lisibilité */
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
        font-size: 1rem;
    }

    /* Effet au focus : plus lumineux */
    input:focus {
        border-color: rgba(0, 212, 255, 0.6);
        background: rgba(0, 0, 0, 0.4);
    }

    /* 5. Bouton Connexion (Le point focal) */
    .btn-submit {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #0056b3 0%, #002d5c 100%); /* Dégradé bleu profond */
        color: #fff;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        margin-top: 15px;
        box-shadow: 0 5px 15px rgba(0, 86, 179, 0.3);
        transition: 0.3s;
    }

    .btn-submit:hover {
        background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        box-shadow: 0 8px 25px rgba(0, 123, 255, 0.5);
    }

    /* 6. Liens secondaires (Luminosité réduite) */
    .extras {
        margin-top: 25px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.6); /* Blanc translucide */
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .extras a {
        color: rgba(0, 212, 255, 0.7); /* Cyan translucide */
        text-decoration: none;
    }

    .extras a:hover {
        color: #fff;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .signup-link {
        margin-top: 20px;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
    }

    /* Les "lueurs" (points de lumière) */
    .glow-point {
        position: absolute;
        width: 5px;
        height: 5px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 10px #fff, 0 0 20px #00d4ff;
    }

    .glow-1 { top: 20px; left: 20px; }
    .glow-2 { bottom: 20px; right: 20px; }
</style>

<div class="glass-login-container">
    <div class="glow-point glow-1"></div>
    <div class="glow-point glow-2"></div>
    
    <div class="photo-avatar">📷</div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <div class="extras">
        <div class="remember-me">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
        </div>
        <a href="#">Forgot Password?</a>
    </div>

    <div class="signup-link">
        Don't have account? <a href="#">Sign up</a>
    </div>

    {% if error %}
    <p style="color: #ff4d4d; font-size: 0.9rem; margin-top: 15px;">{{ error }}</p>
    {% endif %}
</div>
